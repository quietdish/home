<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">

    <style>

        .nanum-gothic-coding-regular {
            font-family: "Nanum Gothic Coding", monospace;
            font-weight: 400;
            font-style: normal;
        }

        .nanum-gothic-coding-bold {
            font-family: "Nanum Gothic Coding", monospace;
            font-weight: 700;
            font-style: normal;
        }

        .welcome {
            font-size: 24px;
            line-height: 5px;
        }

        .input {
            font-size: 10px;
            line-height: 5px;
        }

    </style>
</head>

<body>

    <div class="welcome">
        <p class="nanum-gothic-coding-regular">지금 가입하시면</p>
        <p class="nanum-gothic-coding-bold">웰컴쿠폰을 드려요!</p> 
    </div>
    <br>
    <div class="input">
        <p class="nanum-gothic-coding-regular">이메일</p>
        <br>
        <p class="nanum-gothic-coding-regular">이름 / 업체명</p>
        <p class="nanum-gothic-coding-regular">비밀번호</p>
        <p class="nanum-gothic-coding-regular">비밀번호 확인</p>
    </div>

</body>
</html>
