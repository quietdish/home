<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>연습</title>
    <style>

        /* 여기에 CSS 쓸 거예요 */
        .box {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            margin: 10px;
            transition: 1s;
        }

        .box:hover {
            background-color: tomato;
            transform: scale(1.2);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

    </style>
</head>

<body>

    <div class="box">box1</div>
    <div class="box">box2</div>
    <div class="box">box3</div>

</body>

</html>
