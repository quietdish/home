<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>연습2</title>
    <style>
        .parent {
            width: 300px;
            height: 300px;
            background-color: skyblue;
            position: relative;
        }

        .child {
            width: 100px;
            height: 100px;
            background-color: tomato;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="child"></div>
    </div>

</body>

</html>
